<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>365 Days of You </title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#0b0810;color:#f5e9f2;margin:16px}
    h1{color:#ffd5e8;text-align:center}
    h2{text-align:center;}
    .controls{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
    input[type=date]{padding:6px;border-radius:6px;border:1px solid #333}
    .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .day{background:#1a0f18;padding:10px;border-radius:8px;text-align:left;cursor:pointer;border:1px solid #2b1220}
    .day.locked{opacity:0.6;cursor:default}
    .day.today{outline:3px solid rgba(255,111,177,0.5)}
    /* modal */
    .modal{position:fixed;left:0;right:0;top:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center}
    .modal-box{background:#120612;padding:14px;border-radius:8px;width:min(480px,95%)}
    textarea{width:100%;height:120px}
    button{padding:8px 12px;border-radius:8px;border:none;background:#ff6fb1;color:white}
  </style>
</head>
<body>
  <h1>365 Days of You </h1>
  <h2>A note for every day of your 17th year</h2>
  <div class="controls">
    <label>Start date: <input id="start" type="date"></label>
    <button id="authorlu">Author: OFF</button>
    <button id="todaylu">Go to Today</button>
  </div>

  <div id="grid" class="grid"></div>

  <div id="modal" style="display:none" class="modal">
    <div class="modal-box">
      <h3 id="modalTitle">Day</h3>
      <p id="modalDate"></p>
      <div id="messageView" style="white-space:pre-wrap;color:#e6d2df;margin-bottom:8px"></div>
      <textarea id="messageInput" style="display:none"></textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button id="savelu" style="display:none">Save</button>
        <button id="closelu">Close</button>
      </div>
    </div>
  </div>

  <script>
    const TOTAL = 365;
    const grid = document.getElementById('grid');
    const startInput = document.getElementById('start');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalDate = document.getElementById('modalDate');
    const messageView = document.getElementById('messageView');
    const messageInput = document.getElementById('messageInput');
    const savelu = document.getElementById('savelu');
    const closelu = document.getElementById('closelu');
    const authorlu = document.getElementById('authorlu');
    const todaylu = document.getElementById('todaylu');

    let authorMode = false; // when true, you can edit messages
    authorlu.addEventListener('click', ()=>{
      authorMode = !authorMode;
      authorlu.textContent = 'Author: ' + (authorMode ? 'ON' : 'OFF');
    });

    // default start date to May 9 (current year)
    function defaultMay9(){
      const y = new Date().getFullYear();
      return `${y}-05-09`;
    }
    if(!localStorage.getItem('ily_start')){
      localStorage.setItem('ily_start', defaultMay9());
    }
    startInput.value = localStorage.getItem('ily_start');
    startInput.addEventListener('change', ()=>{
      localStorage.setItem('ily_start', startInput.value);
      render();
    });

    function dayDate(start, index){
      const d = new Date(start);
      d.setDate(d.getDate() + index - 1);
      return d;
    }

    function isUnlocked(start, index){
      const today = new Date(); today.setHours(0,0,0,0);
      const d = dayDate(start,index); d.setHours(0,0,0,0);
      return d <= today;
    }

    function isToday(start,index){
      const today = new Date(); today.setHours(0,0,0,0);
      const d = dayDate(start,index); d.setHours(0,0,0,0);
      return d.getTime() === today.getTime();
    }

    function render(){
      grid.innerHTML = '';
      const start = new Date(localStorage.getItem('ily_start'));
      for(let i=1;i<=TOTAL;i++){
        const lu = document.createElement('div');
        lu.className = 'day';
        if(!isUnlocked(start,i)) lu.classList.add('locked');
        if(isToday(start,i)) lu.classList.add('today');
        lu.textContent = i + ' - ' + dayDate(start,i).toLocaleDateString();
        lu.addEventListener('click', ()=>{
          if(!isUnlocked(start,i)) return;
          openModal(i);
        });
        grid.appendChild(lu);
      }
    }

    let current = null;
    function openModal(i){
      current = i;
      const start = new Date(localStorage.getItem('ily_start'));
      const d = dayDate(start,i);
      modalTitle.textContent = 'Day ' + i;
      modalDate.textContent = d.toDateString();
      const saved = localStorage.getItem('ily-day-' + i) || '';
      messageView.textContent = saved || 'No message yet.';
      messageInput.value = saved;
      // show editing controls only if author mode
      messageInput.style.display = authorMode ? 'block' : 'none';
      savelu.style.display = authorMode ? 'inline-block' : 'none';
      modal.style.display = 'flex';
    }

    savelu.addEventListener('click', ()=>{
      if(current==null) return;
      const t = messageInput.value.trim();
      if(t) localStorage.setItem('ily-day-' + current, t);
      else localStorage.removeItem('ily-day-' + current);
      modal.style.display = 'none';
      render();
    });

    closelu.addEventListener('click', ()=>{ modal.style.display = 'none'; });

    todaylu.addEventListener('click', ()=>{
      // simply scroll the today's card into view
      const start = new Date(localStorage.getItem('ily_start'));
      for(let i=1;i<=TOTAL;i++){
        if(isToday(start,i)){
          const card = grid.children[i-1]; if(card) card.scrollIntoView({behavior:'smooth',block:'center'}); break;
        }
      }
    });

    render();
  </script>
</body>
</html>
